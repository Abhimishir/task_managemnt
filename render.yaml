services:
  - type: web
    name: task-management-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${task-db.host}:${task-db.port}/${task-db.database}
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: task-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: task-db
          property: password
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JWT_SECRET
        generateValue: true # Render will generate a random secret for you

databases:
  - name: task-db
    plan: free
    databaseName: taskdb
    user: taskuser
