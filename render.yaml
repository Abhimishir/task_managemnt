services:
  - type: web
    name: task-management-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: task-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: task-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: task-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: task-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: task-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: task-db
    plan: free
    databaseName: taskdb
    user: taskuser
